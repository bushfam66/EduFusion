<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFusion - Account Setup</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Complete Your Profile</h1>
                <p>Tell us more about your school so EduFusion can personalize your learning.</p>
            </div>
            <form id="setupForm" class="auth-form active-form">
                <div class="form-group">
                    <label for="schoolName">School Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-school"></i>
                        <input type="text" id="schoolName" name="school" placeholder="Enter your school name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="studentAge">Age</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-graduate"></i>
                        <input type="number" id="studentAge" name="age" placeholder="Enter your age" min="10" max="30" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="studentClass">Class</label>
                    <div class="input-wrapper">
                        <i class="fas fa-chalkboard"></i>
                        <input type="text" id="studentClass" name="class" placeholder="Enter your class / form" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="studentPathway">Pathway</label>
                    <div class="input-wrapper">
                        <i class="fas fa-stream"></i>
                        <select id="studentPathway" name="pathway" required>
                            <option value="">Select your pathway</option>
                            <option value="arts">Arts & Sports</option>
                            <option value="stem">STEM</option>
                            <option value="social">Social Science</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Save and Continue</button>
                <div id="setupError" class="error-message"></div>
                <div id="setupSuccess" class="success-message"></div>
            </form>
        </div>
        <div class="auth-decoration">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script>
        function getCurrentUser() {
            const currentUser = localStorage.getItem('edufusion_current_user');
            return currentUser ? JSON.parse(currentUser) : null;
        }

        function getUsers() {
            return JSON.parse(localStorage.getItem('edufusion_users') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('edufusion_users', JSON.stringify(users));
        }

        function redirectToLogin() {
            window.location.href = 'login.html';
        }

        function redirectToDashboard() {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.role === 'teacher') {
                window.location.href = 'teacher-dashboard.html';
            } else if (currentUser.role === 'administrator') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        function initForm() {
            const user = getCurrentUser();
            if (!user) {
                redirectToLogin();
                return;
            }

            const users = getUsers();
            const storedUser = users.find(u => u.id === user.id);
            if (storedUser && storedUser.profileComplete) {
                redirectToDashboard();
                return;
            }

        document.getElementById('setupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('setupError').textContent = '';
            document.getElementById('setupSuccess').textContent = '';

            const user = getCurrentUser();
            if (!user) {
                redirectToLogin();
                return;
            }

            const school = document.getElementById('schoolName').value.trim();
            const age = document.getElementById('studentAge').value.trim();
            const studentClass = document.getElementById('studentClass').value.trim();
            const pathway = document.getElementById('studentPathway').value;

            if (!school || !age || !studentClass || !pathway) {
                document.getElementById('setupError').textContent = 'Please complete all fields before continuing.';
                return;
            }

            const users = getUsers();
            const userIndex = users.findIndex(u => u.id === user.id);
            if (userIndex === -1) {
                document.getElementById('setupError').textContent = 'Unable to save your profile. Please login again.';
                return;
            }

            users[userIndex] = {
                ...users[userIndex],
                profileComplete: true,
                profile: {
                    school,
                    age,
                    class: studentClass,
                    pathway
                }
            };
            saveUsers(users);

            localStorage.setItem('edufusion_current_user', JSON.stringify({
                id: users[userIndex].id,
                name: users[userIndex].name,
                email: users[userIndex].email,
                profileComplete: true,
                profile: users[userIndex].profile
            }));

            document.getElementById('setupSuccess').textContent = 'Profile saved successfully! Redirecting to your home screen...';

            setTimeout(() => {
                redirectToDashboard();
            }, 1200);
        });

        document.addEventListener('DOMContentLoaded', function() {
            initForm();
        });
    </script>
</body>
</html>
