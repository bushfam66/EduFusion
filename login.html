<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFusion - Login & Register</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>EduFusion</h1>
                <p>Your Learning Companion</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active-form">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="loginRole">Login As</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-tag"></i>
                        <select id="loginRole" onchange="updateLoginDemoCredentials()">
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="administrator">Administrator</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="auth-btn">Login</button>
                <p class="form-toggle">
                    Don't have an account? 
                    <a href="#" onclick="toggleForms(event)">Register here</a>
                </p>
                <div id="loginError" class="error-message"></div>
                <div id="loginSuccess" class="success-message"></div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="registerName" name="name" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerRole">Account Type</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-tag"></i>
                        <select id="registerRole" name="role" required>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="administrator">Administrator</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="teacherSubjectsSection" style="display:none;">
                    <label>Subjects Taught</label>
                    <div class="subject-options" style="display:grid; gap:0.5rem;">
                        <label><input type="checkbox" name="teacherSubjects" value="Mathematics"> Mathematics</label>
                        <label><input type="checkbox" name="teacherSubjects" value="Biology"> Biology</label>
                        <label><input type="checkbox" name="teacherSubjects" value="Physics"> Physics</label>
                        <label><input type="checkbox" name="teacherSubjects" value="Chemistry"> Chemistry</label>
                        <label><input type="checkbox" name="teacherSubjects" value="History"> History</label>
                        <label><input type="checkbox" name="teacherSubjects" value="Computer Science"> Computer Science</label>
                        <label><input type="checkbox" name="teacherSubjects" value="English"> English</label>
                        <label><input type="checkbox" name="teacherSubjects" value="Kiswahili"> Kiswahili</label>
                    </div>
                    <p style="font-size:0.9rem; color:#4a5568; margin-top:0.5rem;">Please select at least one subject you teach.</p>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="registerEmail" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerPassword" name="password" placeholder="Create a strong password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerConfirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="registerConfirm" name="confirm" placeholder="Confirm your password" required>
                    </div>
                </div>
                <div class="password-strength">
                    <p>Password Strength: <span id="strengthText">Weak</span></p>
                    <div class="strength-bar">
                        <div id="strengthIndicator" class="strength-level weak"></div>
                    </div>
                </div>
                <div class="form-agreement">
                    <label>
                        <input type="checkbox" id="agreeTerms" required> 
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
                <p class="form-toggle">
                    Already have an account? 
                    <a href="#" onclick="toggleForms(event)">Login here</a>
                </p>
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>
            </form>

            <!-- Demo Users Info -->
            <div class="demo-info" id="demoInfo">
                <p><strong>Demo Credentials:</strong></p>
                <div id="demoCredentialsDisplay"></div>
            </div>
        </div>

        <!-- Background Decoration -->
        <div class="auth-decoration">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // Initialize demo user on first load
        async function initializeDemoUser() {
            try {
                await edufusionDB.init();
                const users = await edufusionDB.getAllUsers();

                const demoExists = users.some(u => u.email === 'demo@edufusion.com');
                const teacherExists = users.some(u => u.email === 'teacher@edufusion.com');
                const adminExists = users.some(u => u.email === 'admin@edufusion.com');

                if (!demoExists || !teacherExists || !adminExists) {
                    await edufusionDB.initializeDemoData();
                }
            } catch (error) {
                console.error('Error initializing database:', error);
                const loginError = document.getElementById('loginError');
                if (loginError) {
                    loginError.textContent = 'Database failed to initialize. Please reopen the page.';
                }
            }
        }

        function updateLoginDemoCredentials() {
            const role = document.getElementById('loginRole').value;
            const credentialsDisplay = document.getElementById('demoCredentialsDisplay');
            
            const credentials = {
                student: { email: 'demo@edufusion.com', password: 'Demo@123', name: 'Demo User (Student)' },
                teacher: { email: 'teacher@edufusion.com', password: 'Teacher@123', name: 'Demo Teacher' },
                administrator: { email: 'admin@edufusion.com', password: 'Admin@123', name: 'Demo Admin' }
            };
            
            const selected = credentials[role];
            credentialsDisplay.innerHTML = `
                <p style="margin: 0.5rem 0;"><strong>${selected.name}</strong></p>
                <p style="margin: 0.25rem 0;">Email: <code>${selected.email}</code></p>
                <p style="margin: 0.25rem 0;">Password: <code>${selected.password}</code></p>
            `;
            document.getElementById('loginEmail').placeholder = `e.g., ${selected.email}`;
        }

        function toggleForms(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.toggle('active-form');
            document.getElementById('registerForm').classList.toggle('active-form');
            clearMessages();
        }

        function updateRegisterRoleFields() {
            const role = document.getElementById('registerRole').value;
            const teacherSection = document.getElementById('teacherSubjectsSection');
            if (role === 'teacher') {
                teacherSection.style.display = 'block';
            } else {
                teacherSection.style.display = 'none';
                document.querySelectorAll('input[name="teacherSubjects"]').forEach(cb => cb.checked = false);
            }
        }

        // Clear all error and success messages
        function clearMessages() {
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginSuccess').textContent = '';
            document.getElementById('registerError').textContent = '';
            document.getElementById('registerSuccess').textContent = '';
        }

        // Password strength indicator
        const registerPasswordInput = document.getElementById('registerPassword');
        if (registerPasswordInput) {
            registerPasswordInput.addEventListener('input', function(e) {
                const password = e.target.value;
                const strength = checkPasswordStrength(password);
                const indicator = document.getElementById('strengthIndicator');
                const text = document.getElementById('strengthText');
                
                indicator.className = `strength-level ${strength}`;
                text.textContent = strength.charAt(0).toUpperCase() + strength.slice(1);
            });
        }

        function checkPasswordStrength(password) {
            if (password.length === 0) return 'weak';
            if (password.length < 6) return 'weak';
            if (password.length < 8) return 'fair';
            
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /\d/.test(password);
            const hasSpecial = /[!@#$%^&*]/.test(password);
            
            let strength = 0;
            if (hasUpper) strength++;
            if (hasLower) strength++;
            if (hasNumber) strength++;
            if (hasSpecial) strength++;
            
            if (strength === 1 || strength === 2) return password.length >= 8 ? 'fair' : 'weak';
            if (strength === 3) return 'good';
            return 'strong';
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessages();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                const user = await edufusionDB.getUserByEmail(email);

                if (user && user.password === password) {
                    const sessionUser = {
                        id: user.id,
                        name: user.name,
                        email: user.email,
                        role: user.role || 'student',
                        profileComplete: user.profileComplete === true,
                        profile: user.profile || null
                    };

                    localStorage.setItem('edufusion_current_user', JSON.stringify(sessionUser));

                    if (rememberMe) {
                        localStorage.setItem('edufusion_remember_me', JSON.stringify({
                            email: user.email,
                            password: user.password
                        }));
                    }

                    document.getElementById('loginSuccess').textContent = 'Login successful! Redirecting...';

                    setTimeout(() => {
                        if (user.role === 'teacher') {
                            window.location.href = 'teacher-dashboard.html';
                        } else if (user.role === 'administrator') {
                            window.location.href = 'admin-dashboard.html';
                        } else if (user.profileComplete !== true) {
                            window.location.href = 'account-setup.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    document.getElementById('loginError').textContent = 'Invalid email or password. Please try again.';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').textContent = 'An error occurred during login. Please try again.';
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessages();

            const name = document.getElementById('registerName').value;
            const role = document.getElementById('registerRole').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            // Validation
            if (!agreeTerms) {
                document.getElementById('registerError').textContent = 'You must agree to the terms and conditions.';
                return;
            }

            if (password !== confirm) {
                document.getElementById('registerError').textContent = 'Passwords do not match.';
                return;
            }

            if (password.length < 6) {
                document.getElementById('registerError').textContent = 'Password must be at least 6 characters long.';
                return;
            }

            if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
                document.getElementById('registerError').textContent = 'Please enter a valid email address.';
                return;
            }

            let teaches = [];
            if (role === 'teacher') {
                teaches = Array.from(document.querySelectorAll('input[name="teacherSubjects"]:checked')).map(cb => cb.value);
                if (teaches.length === 0) {
                    document.getElementById('registerError').textContent = 'Please select at least one subject you teach.';
                    return;
                }
            }

            try {
                // Create new user
                const newUser = {
                    name: name,
                    email: email,
                    password: password,
                    role: role,
                    createdAt: new Date().toISOString(),
                    profileComplete: role === 'student' ? false : true,
                    profile: role === 'teacher' ? { teaches } : role === 'administrator' ? { school: '' } : null
                };

                await edufusionDB.addUser(newUser);

                document.getElementById('registerSuccess').textContent = 'Account created successfully! Redirecting...';

                setTimeout(() => {
                    localStorage.setItem('edufusion_current_user', JSON.stringify({
                        id: newUser.id,
                        name: newUser.name,
                        email: newUser.email,
                        role: newUser.role,
                        profileComplete: newUser.profileComplete,
                        profile: newUser.profile
                    }));

                    if (role === 'teacher') {
                        window.location.href = 'teacher-dashboard.html';
                    } else if (role === 'administrator') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'account-setup.html';
                    }
                }, 1500);
            } catch (error) {
                if (error.message === 'Email already exists') {
                    document.getElementById('registerError').textContent = 'This email is already registered. Please login instead.';
                } else {
                    console.error('Registration error:', error);
                    document.getElementById('registerError').textContent = 'An error occurred during registration. Please try again.';
                }
            }
        });

        // Load saved login if "Remember me" was checked
        function loadSavedLogin() {
            const saved = localStorage.getItem('edufusion_remember_me');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('loginEmail').value = data.email;
                document.getElementById('loginPassword').value = data.password;
                document.getElementById('rememberMe').checked = true;
            }
        }

        // Check if already logged in
        function checkIfLoggedIn() {
            const currentUser = localStorage.getItem('edufusion_current_user');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                if (user.role === 'teacher') {
                    window.location.href = 'teacher-dashboard.html';
                } else if (user.role === 'administrator') {
                    window.location.href = 'admin-dashboard.html';
                } else if (user.profileComplete !== true) {
                    window.location.href = 'account-setup.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeDemoUser();
            checkIfLoggedIn();
            loadSavedLogin();
            updateLoginDemoCredentials();
            const registerRoleSelect = document.getElementById('registerRole');
            if (registerRoleSelect) {
                registerRoleSelect.addEventListener('change', updateRegisterRoleFields);
                updateRegisterRoleFields();
            }
        });
    </script>
</body>
</html>
