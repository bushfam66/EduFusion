<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFusion - Subject Inventory</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="student-mode theme-plain">
    <div class="student-dashboard">
        <header class="student-header">
            <div>
                <h1>Subject Inventory</h1>
                <p class="student-role">Inventory overview</p>
            </div>
            <div class="student-header-actions">
                <button class="inventory-button" onclick="window.location.href='student.html'">Back to Dashboard</button>
            </div>
        </header>

        <main class="student-content">
            <section class="student-section">
                <h2>No Subjects Available</h2>
                <p>The subject inventory is currently empty. Once your teacher adds subjects, they will appear here for selection and review.</p>
                <div class="student-section-card student-empty-card">
                    <h3>Subject inventory is currently empty</h3>
                    <p>There are no subject entries to display right now.</p>
                </div>
            </section>
        </main>
    <script src="theme.js"></script>
</body>
</html>
