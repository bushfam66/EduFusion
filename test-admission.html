<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFusion - Admission System Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <a href="#" onclick="goToHome()"><h1>EduFusion</h1></a>
            </div>
        </header>

        <main class="main-content">
            <div class="card">
                <h2>Admission System Test</h2>
                <p>This page runs automated tests for the student admission workflow.</p>
                <div id="test-results">
                    <p>Running tests... Check the browser console for detailed results.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="database.js"></script>
    <script src="test-admission.js"></script>
    <script>
        function goToHome() {
            const user = JSON.parse(localStorage.getItem('edufusion_current_user') || 'null');
            if (user) {
                if (user.role === 'teacher') {
                    window.location.href = 'teacher-dashboard.html';
                } else if (user.role === 'administrator') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'student.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
